# Proyecto monorepo:
# - backend/  -> Flask
# - frontend/ -> Angular

name: Build and deploy Flask backend to Azure Web App - fedsidumsa-system-umsa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies into package
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install --target="./.python_packages/lib/site-packages" -r requirements.txt

      - name: Create backend deployment zip
        run: |
          cd backend
          zip -r ../backend-app.zip . -x "__pycache__/*" "*.pyc" ".git/*" ".dockerignore" "Dockerfile" "docker-compose.yml"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: backend-app.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DDC49C386BBB4DEFA38245D47952FEA9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DF54C44CF13D4662B58141B636AFEB33 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C0B23E80AC624B53BDCDAF9CA0AB7A59 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'fedsidumsa-system-umsa'
          slot-name: 'Production'
          package: backend-app.zip
