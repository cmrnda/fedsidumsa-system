services:
  api:
    build: .
    container_name: fedsidumsa_api
    env_file:
      - .env.docker
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      - db
    command: flask --app run.py run --host=0.0.0.0 --port=5000

  db:
    image: postgres:16
    container_name: fedsidumsa_db
    environment:
      POSTGRES_DB: fedsidumsa_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: